name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy aipro

      - name: Tests
        env:
          AIPRO_MODE: PAPER
          ENABLE_LIVE_TRADING: "0"
          AIPRO_LIVE_CONFIRM: "NO"
          MAX_ORDER_KRW: "0"
        run: python -m pytest --cov=aipro --cov-report=term-missing
